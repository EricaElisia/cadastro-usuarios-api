<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | iNota</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="auth-page">
    <a class="auth-brand-corner" href="login.html" aria-label="iNota">
        <img src="assets/logo.svg" alt="Logo iNota" class="brand-logo">
        <div>
            <span class="brand-name">iNota</span>
            <span class="brand-subtitle">Seu dia em quadros simples</span>
        </div>
    </a>

    <main class="auth-shell">
        <section class="auth-card" aria-label="Login no iNota">
            <div class="auth-heading">
                <p class="eyebrow">Entrar</p>
                <h1>Bem-vindo de volta ao seu espaço de tarefas.</h1>
            </div>

            <form id="formLogin" class="auth-form" novalidate>
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="voce@email.com" autocomplete="email" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" autocomplete="current-password" required>

                <button type="submit" class="primary-btn">Entrar</button>
            </form>

            <p id="mensagem" class="form-message" role="status" aria-live="polite"></p>

            <p class="auth-switch">
                Não tem conta?
                <a href="index.html">Cadastrar agora</a>
            </p>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
