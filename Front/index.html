<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | iNota</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="auth-page">
    <a class="auth-brand-corner" href="login.html" aria-label="iNota">
        <img src="assets/logo.svg" alt="Logo iNota" class="brand-logo">
        <div>
            <span class="brand-name">iNota</span>
            <span class="brand-subtitle">Organize tarefas com clareza</span>
        </div>
    </a>

    <main class="auth-shell">
        <section class="auth-card" aria-label="Cadastro no iNota">
            <div class="auth-heading">
                <p class="eyebrow">Criar conta</p>
                <h1>Comece seu quadro em poucos segundos.</h1>
            </div>

            <form id="formCadastro" class="auth-form" novalidate>
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="name" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="voce@email.com" autocomplete="email" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo de 8 caracteres" autocomplete="new-password" required minlength="8">

                <label for="senha2">Confirmar senha</label>
                <input type="password" id="senha2" name="senha2" placeholder="Repita sua senha" autocomplete="new-password" required minlength="8">

                <button type="submit" class="primary-btn">Cadastrar</button>
            </form>

            <p id="mensagem" class="form-message" role="status" aria-live="polite"></p>

            <p class="auth-switch">
                Já tem conta?
                <a href="login.html">Fazer login</a>
            </p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
