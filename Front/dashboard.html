<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header>
    <div>
        <h2>iNota</h2>
        <p id="boasVindas"></p>
    </div>
    <button onclick="logout()">Sair</button>
</header>

<div class="container">

    <!-- FORMULÁRIO DE NOVA TAREFA -->
    <div class="nova-tarefa">

        <input type="text" id="titulo" placeholder="Título da tarefa">

        <input type="text" id="descricao" placeholder="Descrição (opcional)">

        <input type="date" id="data" min="">

        <select id="prioridade">
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
        </select>

        <button onclick="adicionarTarefa()">Adicionar</button>

    </div>

    <!-- QUADRO DE TAREFAS -->
    <div class="quadro">

        <!-- COLUNA PENDENTE -->
        <div class="coluna">
            <div class="titulo-coluna">
                <h3>Pendente</h3>
                <button onclick="criarLista('pendente')">+</button>
            </div>
            <div id="pendente" class="listas"></div>
        </div>

        <!-- COLUNA EM ANDAMENTO -->
        <div class="coluna">
            <div class="titulo-coluna">
                <h3>Em andamento</h3>
                <button onclick="criarLista('andamento')">+</button>
            </div>
            <div id="andamento"></div>
        </div>

        <!-- COLUNA CONCLUÍDO -->
        <div class="coluna">
            <div class="titulo-coluna">
                <h3>Concluído</h3>
                <button onclick="criarLista('andamento')">+</button>
            </div>
            <div id="concluido"></div>
        </div>

    </div>

    <!-- BOTÃO PARA CRIAR NOVA LISTA -->
    <div style="margin-top:20px;">
        <button onclick="criarLista()">+ Criar nova lista</button>
    </div>

</div>

<!-- MODAL DE EDIÇÃO -->
<div id="modalEdicao" class="modal">
  <div class="modal-content">
    
    <h3>Editar Tarefa</h3>

    <input type="text" id="editTitulo" placeholder="Título">

    <input type="text" id="editDescricao" placeholder="Descrição">

    <input type="date" id="editData">

    <select id="editPrioridade">
      <option value="baixa">Baixa</option>
      <option value="media">Média</option>
      <option value="alta">Alta</option>
    </select>

    <button onclick="salvarEdicao()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>

  </div>
</div>

<script src="dashboard.js"></script>

</body>
</html>
