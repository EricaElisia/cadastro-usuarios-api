<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar senha | iNota</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body class="auth-page">
    <a class="auth-brand-corner" href="login.html" aria-label="iNota">
        <img src="assets/logo.svg" alt="Logo iNota" class="brand-logo">
        <div>
            <span class="brand-name">iNota</span>
            <span class="brand-subtitle">Seu dia em quadros simples</span>
        </div>
    </a>

    <main class="auth-shell">
        <section class="auth-card" aria-label="Recuperacao de senha">
            <div class="auth-heading">
                <p class="eyebrow">Recuperar senha</p>
                <h1>Receba um link temporario para voltar ao iNota.</h1>
            </div>

            <form id="recoverForm" class="auth-form" novalidate>
                <label for="email">E-mail cadastrado</label>
                <input type="email" id="email" name="email" placeholder="voce@email.com" autocomplete="email" required>

                <button type="submit" class="primary-btn">Enviar link</button>
            </form>

            <p id="mensagem" class="form-message" role="status" aria-live="polite"></p>

            <p class="auth-switch">
                Lembrou a senha?
                <a href="login.html">Voltar para login</a>
            </p>
        </section>
    </main>

    <script src="recuperar-senha.js"></script>
</body>
</html>
